{% extends 'submissions/base.html' %}
{% block title %}Submit - SwahiliPot Submission System{% endblock %}
{% block content %}
<div class = "hero">
    <h1>Make a Submission</h1>
    <p>Fill in the form below and click submit.</p>
    <form method= "POST">
        {% csrf_token %}
        {{form.as_p}}
        <button type ="submit" class="btn">Submit</button>
    </form>
</div>
{% endblock %}
